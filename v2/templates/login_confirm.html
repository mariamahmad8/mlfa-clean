<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLFA — Confirm sign in</title>
    <link rel="icon" type="image/png" href="/mlfa-favicon.png?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/shared.css">
    <style>
        body { min-height: 100vh; background: var(--bg); display: flex; align-items: center; justify-content: center; }
        .confirm-card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 40px 44px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .confirm-logo { width: 56px; height: 56px; border-radius: 12px; margin: 0 auto 20px; display: block; object-fit: cover; }
        .confirm-eyebrow {
            font-family: var(--font-display);
            font-size: 11px; font-weight: 700;
            letter-spacing: 0.14em; text-transform: uppercase;
            color: var(--mlfa-orange);
            margin: 0 0 8px;
        }
        .confirm-title {
            font-family: var(--font-display);
            font-size: 26px; font-weight: 600;
            color: var(--text);
            margin: 0 0 14px;
        }
        .confirm-body {
            font-size: 14px; line-height: 1.55;
            color: var(--text-muted);
            margin: 0 0 8px;
        }
        .confirm-email {
            font-weight: 600;
            color: var(--text);
        }
        .confirm-btn {
            margin-top: 28px;
            width: 100%;
            min-height: 48px;
            font-size: 14px;
            font-weight: 600;
            background: var(--mlfa-teal) !important;
            border-color: var(--mlfa-teal) !important;
            color: #F5F1EA !important;
        }
        .confirm-btn:hover {
            background: var(--mlfa-teal-hover) !important;
            border-color: var(--mlfa-teal-hover) !important;
        }
        .confirm-foot {
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-soft);
        }
    </style>
</head>
<body>
    <main class="confirm-card">
        <img class="confirm-logo" src="/mlfa-logo.jpeg" alt="MLFA">
        <p class="confirm-eyebrow">MLFA Operations Hub</p>
        <h1 class="confirm-title">Confirm sign in</h1>
        <p class="confirm-body">You're about to sign in as</p>
        <p class="confirm-email">{{ email }}</p>
        <form method="POST" action="/login/verify">
            <input type="hidden" name="token" value="{{ token }}">
            <button class="btn primary confirm-btn" type="submit">Sign in</button>
        </form>
        <p class="confirm-foot">If this wasn't you, close this tab. The link expires shortly.</p>
    </main>
</body>
</html>
