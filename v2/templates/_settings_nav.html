<aside class="settings-sidebar">
    <div class="sidebar-section">Settings</div>
    <a href="/settings/inboxes" class="nav-item" data-path="/settings/inboxes">Inboxes</a>
    <a href="/settings/categories" class="nav-item" data-path="/settings/categories">Categories</a>
    <a href="/settings/recipients" class="nav-item" data-path="/settings/recipients">Recipients</a>
    <a href="/settings/templates" class="nav-item" data-path="/settings/templates">Reply templates</a>
    {% if session.get('role') == 'admin' %}
    <a href="/settings/users" class="nav-item" data-path="/settings/users">Users</a>
    {% endif %}
    <a href="/settings/audit" class="nav-item" data-path="/settings/audit">Audit log</a>
    <a href="/settings/preview" class="nav-item" data-path="/settings/preview">Test &amp; preview</a>
</aside>
<script>
    (function() {
        const path = window.location.pathname;
        document.querySelectorAll('.nav-item').forEach(el => {
            if (el.dataset.path === path) el.classList.add('active');
        });
    })();

    // Dense-modal tabs. Shared by the category + inbox editors: clicking a
    // .dm-tab shows the matching .tab-panel within the same modal. Hidden
    // panels stay in the DOM, so save handlers still read every field.
    function activateDenseTab(modal, name) {
        if (!modal) return;
        modal.querySelectorAll('.dm-tab').forEach(t => {
            t.classList.toggle('active', t.dataset.tab === name);
        });
        modal.querySelectorAll('.tab-panel').forEach(p => {
            p.classList.toggle('active', p.dataset.panel === name);
        });
    }
    document.addEventListener('click', (e) => {
        const btn = e.target.closest('.dm-tab');
        if (!btn) return;
        activateDenseTab(btn.closest('.dense-modal'), btn.dataset.tab);
    });

    // Modern info tooltip: creates a fixed-position floating box so it never
    // gets clipped by scrollable modals or overflow parents.
    (function() {
        let floating = null;
        function ensureFloating() {
            if (!floating) {
                floating = document.createElement('div');
                floating.className = 'info-floating';
                document.body.appendChild(floating);
            }
            return floating;
        }
        function positionTooltip(tip, box) {
            const rect = tip.getBoundingClientRect();
            const boxRect = box.getBoundingClientRect();
            // Prefer above; if not enough space, place below
            let top = rect.top - boxRect.height - 8;
            if (top < 8) top = rect.bottom + 8;
            let left = rect.left + rect.width / 2 - boxRect.width / 2;
            if (left < 8) left = 8;
            if (left + boxRect.width > window.innerWidth - 8) {
                left = window.innerWidth - boxRect.width - 8;
            }
            box.style.left = left + 'px';
            box.style.top = top + 'px';
        }
        document.addEventListener('mouseover', (e) => {
            const tip = e.target.closest('.info-tip');
            if (!tip) return;
            const content = tip.querySelector('.info-content');
            if (!content) return;
            const box = ensureFloating();
            box.innerHTML = content.innerHTML;
            box.classList.toggle('wide', tip.classList.contains('wide'));
            box.classList.add('visible');
            box.style.left = '-9999px';
            box.style.top = '0';
            requestAnimationFrame(() => positionTooltip(tip, box));
        });
        document.addEventListener('mouseout', (e) => {
            const tip = e.target.closest('.info-tip');
            if (!tip) return;
            if (floating) floating.classList.remove('visible');
        });
    })();
</script>
